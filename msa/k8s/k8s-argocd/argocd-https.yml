
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argo-kanges-click
  namespace: argocd
spec:
  secretName: argo-kanges-click
  duration: 2160h #90day
  renewBefore: 360h #before 15day
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  commonName: argo.kanges.click
  dnsNames:
  - argo.kanges.click